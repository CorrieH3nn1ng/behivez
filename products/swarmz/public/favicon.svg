<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#f59e0b"/>
  <!-- Arrow shape made of 3 small bees flying in formation -->
  <!-- Lead bee (front of arrow) -->
  <g transform="translate(88,64) scale(0.9)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#1c1917"/>
    <ellipse cx="-5" cy="0" rx="5" ry="7" fill="#f59e0b"/>
    <ellipse cx="5" cy="-7" rx="6" ry="3" fill="rgba(255,255,255,0.6)" transform="rotate(-20)"/>
    <ellipse cx="5" cy="7" rx="6" ry="3" fill="rgba(255,255,255,0.6)" transform="rotate(20)"/>
  </g>
  <!-- Top bee -->
  <g transform="translate(52,38) scale(0.75)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#1c1917"/>
    <ellipse cx="-5" cy="0" rx="5" ry="7" fill="#f59e0b"/>
    <ellipse cx="5" cy="-7" rx="6" ry="3" fill="rgba(255,255,255,0.6)" transform="rotate(-20)"/>
    <ellipse cx="5" cy="7" rx="6" ry="3" fill="rgba(255,255,255,0.6)" transform="rotate(20)"/>
  </g>
  <!-- Bottom bee -->
  <g transform="translate(52,90) scale(0.75)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#1c1917"/>
    <ellipse cx="-5" cy="0" rx="5" ry="7" fill="#f59e0b"/>
    <ellipse cx="5" cy="-7" rx="6" ry="3" fill="rgba(255,255,255,0.6)" transform="rotate(-20)"/>
    <ellipse cx="5" cy="7" rx="6" ry="3" fill="rgba(255,255,255,0.6)" transform="rotate(20)"/>
  </g>
  <!-- Trail lines showing arrow direction -->
  <line x1="30" y1="38" x2="44" y2="38" stroke="#1c1917" stroke-width="2" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="30" y1="90" x2="44" y2="90" stroke="#1c1917" stroke-width="2" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="55" y1="64" x2="78" y2="64" stroke="#1c1917" stroke-width="2" stroke-dasharray="3,3" opacity="0.4"/>
</svg>
